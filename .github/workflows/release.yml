name: Release

# Trigger on version tags such as v1.2.3
on:
  push:
    tags:
      - 'v*.*.*'

# Cancel in-progress runs for the same tag.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Android APK ───────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             aeki-appi-${{ github.ref_name }}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: aeki-appi-${{ github.ref_name }}-android.apk

  # ── Web ───────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Add web platform
        run: flutter create --platforms=web .

      - name: Install dependencies
        run: flutter pub get

      - name: Build web release
        run: flutter build web --release

      - name: Package web build
        run: |
          cd build/web
          zip -r ../../aeki-appi-${{ github.ref_name }}-web.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: aeki-appi-${{ github.ref_name }}-web.zip

  # ── Linux ─────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev pkg-config

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Add linux platform
        run: flutter create --platforms=linux .

      - name: Install dependencies
        run: flutter pub get

      - name: Build linux release
        run: flutter build linux --release

      - name: Package linux build
        run: |
          tar -czvf aeki-appi-${{ github.ref_name }}-linux.tar.gz \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: aeki-appi-${{ github.ref_name }}-linux.tar.gz

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Add macOS platform
        run: flutter create --platforms=macos .

      - name: Add Bluetooth usage description
        run: |
          /usr/libexec/PlistBuddy \
            -c "Add :NSBluetoothAlwaysUsageDescription string 'AekiAppi needs Bluetooth to communicate with your Äike scooter.'" \
            macos/Runner/Info.plist

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ${{ github.workspace }}/aeki-appi-${{ github.ref_name }}-macos.zip \
            aeki_appi.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: aeki-appi-${{ github.ref_name }}-macos.zip

  # ── Windows ───────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Add windows platform
        run: flutter create --platforms=windows .

      - name: Install dependencies
        run: flutter pub get

      - name: Build windows release
        run: flutter build windows --release

      - name: Package windows build
        # Flutter currently only targets x64 on Windows; update path if ARM64 support is added.
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath aeki-appi-${{ github.ref_name }}-windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: aeki-appi-${{ github.ref_name }}-windows.zip

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs:
      - build-android
      - build-web
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/aeki-appi-${{ github.ref_name }}-android.apk \
            artifacts/aeki-appi-${{ github.ref_name }}-web.zip \
            artifacts/aeki-appi-${{ github.ref_name }}-linux.tar.gz \
            artifacts/aeki-appi-${{ github.ref_name }}-macos.zip \
            artifacts/aeki-appi-${{ github.ref_name }}-windows.zip
